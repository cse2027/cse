<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="style1.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <form id="registerForm" class="login-card">
        <h3>Create Account</h3>

        <label>Email</label>
        <input
            type="email"
            id="email"
            placeholder="rollno@vvit.net"
            required
        >

        <label>Password</label>
        <input
            type="password"
            id="password"
            placeholder="Create a password"
            required
            minlength="6"
        >

        <p style="font-size: 0.8rem; color: rgba(255, 255, 255, 0.75); line-height: 1.4; margin-top: -5px; margin-bottom: 20px; border-left: 2px solid #7C4DFF; padding-left: 8px; text-align: left;">
            <strong>Note:</strong> Once you confirm the email, you will get an error message which confirms that you are an authenticated user. You can then log in.This Feature is in development        </p>

        <button type="submit">
            Register
        </button>

        <button
            type="button"
            class="secondary-btn"
            onclick="window.location.href='login.html'"
        >
            Already have an account? Login
        </button>
    </form>

    <script type="module">
    import { signUp } from "./auth.js";

    const form = document.getElementById("registerForm");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document
            .getElementById("email")
            .value
            .trim()
            .toLowerCase();

        const password = document
            .getElementById("password")
            .value;

        // Allow only VVIT emails
        if (!email.endsWith("@vvit.net")) {
            Swal.fire({
                icon: "warning",
                title: "Invalid Email",
                text: "Only @vvit.net email addresses are allowed."
            });

            return;
        }

        const { error } = await signUp(email, password);

        if (error) {
            Swal.fire({
                icon: "error",
                title: "Registration Failed",
                text: error.message
            });
        } else {
            Swal.fire({
                icon: "success",
                title: "Registration Successful",
                text: "Please check your email to verify your account."
            }).then(() => {
                window.location.href = "login.html";
            });
        }
    });
</script>

</body>
</html>
