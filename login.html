<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login</title>

    <link rel="stylesheet" href="style1.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body style="display: none;">

    <form id="loginForm" class="login-card">
        <h3> Login</h3>

        <label for="email">VVIT Email</label>
        <input
            type="email"
            id="email"
            placeholder="rollnumber@vvit.net"
            required
        >

        <label for="password">Password</label>
        <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
        >

        <button type="submit">
            Log In
        </button>
    </form>

    <script type="module">
        import { signIn, checkSession } from "./auth.js";

        // Redirect to upload page if already logged in
        const session = await checkSession();
        if (session) {
            window.location.href = "upload.html";
        } else {
            document.body.style.display = "";
        }

        const form = document.getElementById("loginForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document
                .getElementById("email")
                .value
                .trim()
                .toLowerCase();

            const password = document
                .getElementById("password")
                .value;

            // Allow only VVIT emails
            if (!email.endsWith("@vvit.net")) {
                Swal.fire({
                    icon: "warning",
                    title: "Invalid Email",
                    text: "Only @vvit.net email addresses are allowed."
                });

                return;
            }

            const { data, error } = await signIn(email, password);

            if (error) {
                Swal.fire({
                    icon: "error",
                    title: "Login Failed",
                    text: error.message
                });
            } else {
                Swal.fire({
                    icon: "success",
                    title: "Login Successful",
                    text: "Welcome back!"
                }).then(() => {
                    window.location.href = "upload.html";
                });
            }
        });
    </script>

</body>
</html>
